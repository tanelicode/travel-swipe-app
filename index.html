<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Travel Swipe</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <section id="start-screen" class="screen active">
      <div class="app-logo">✈️</div>

      <h1>Travel Swipe</h1>

      <p class="intro-text">
        Wähle eine Stadt oder nutze deinen Standort, um passende Sehenswürdigkeiten in deiner Nähe zu entdecken.
      </p>

      <button id="use-location-btn" class="location-btn" type="button">
        📍 Standort verwenden
      </button>

      <p id="location-status" class="location-status"></p>

      <div id="city-list" class="city-list"></div>
    </section>

    <section id="swipe-screen" class="screen">
      <header class="top-bar">
        <div class="top-row">
          <div>
            <h2 id="city-title">Sehenswürdigkeiten</h2>
            <span id="city-badge" class="city-badge">📍 Stadt auswählen</span>
          </div>
        </div>

        <p id="progress-text">1 von 20 bewertet</p>

        <div class="progress-track">
          <div id="progress-bar"></div>
        </div>
      </header>

      <div id="card" class="card">
        <div class="image-slider">
          <img id="place-image" src="" alt="Sehenswürdigkeit" />
          <div id="image-dots" class="image-dots"></div>
        </div>

        <div class="card-content">
          <span id="place-category"></span>
          <h3 id="place-name"></h3>
          <p id="place-description"></p>
        </div>
      </div>

      <div class="actions">
        <button id="dislike-btn" class="dislike-btn" type="button">
          ✕ Gefällt mir nicht
        </button>

        <button id="like-btn" class="like-btn" type="button">
          ✓ Gefällt mir
        </button>
      </div>
    </section>

    <section id="result-screen" class="screen">
      <h2>Deine Route</h2>

      <div class="result-card">
        <div class="route-summary">
          <strong id="selected-count"></strong>
          <span id="start-point"></span>
          <span id="total-route-info"></span>
        </div>

        <div id="route-map"></div>

        <ol id="route-list"></ol>
      </div>

      <template id="route-item-template">
        <li class="route-item">
          <div class="route-step-number"></div>

          <div class="route-step-content">
            <strong class="route-place-name"></strong>
            <span class="route-place-category"></span>
            <small class="route-place-distance"></small>
          </div>
        </li>
      </template>

      <button id="restart-btn" class="secondary-btn" type="button">
        Neu starten
      </button>
    </section>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/cities.js"></script>
  <script src="data/placesByCity.js"></script>
  <script src="app.js"></script>
</body>
</html>
